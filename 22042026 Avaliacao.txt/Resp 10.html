<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Promoção da Loja</title>
</head>
<body>

  <h1> Promoção da Loja</h1>

  <label for="valor">Valor da compra (R$):</label>
  <input type="number" id="valor" min="0" step="0.01" placeholder="Ex: 150.00" />

  <br><br>

  <button onclick="calcularDesconto()">Calcular</button>

  <div id="resultado"></div>

  <script>
    function calcularDesconto() {
      const valor = parseFloat(document.getElementById("valor").value);
      const resultado = document.getElementById("resultado");

      if (isNaN(valor) || valor < 0) {
        resultado.innerHTML = "<p>⚠ Informe um valor válido.</p>";
        return;
      }

      let desconto = 0;
      let percentual = 0;

      if (valor > 200) {
        percentual = 20;
        desconto = valor * 0.20;
      } else if (valor > 100) {
        percentual = 10;
        desconto = valor * 0.10;
      }

      const valorFinal = valor - desconto;

      resultado.innerHTML = `
        <p>Valor original: R$ ${valor.toFixed(2)}</p>
        <p>Desconto aplicado: ${percentual}% (R$ ${desconto.toFixed(2)})</p>
        <p>Valor final: R$ ${valorFinal.toFixed(2)}</p>
      `;
    }
  </script>

</body>
</html>
