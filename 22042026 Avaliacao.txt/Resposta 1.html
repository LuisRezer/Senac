<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portão do Castelo</title>
</head>
<body>

  <h1> Portão do Castelo</h1>

  <label for="idade">Informe sua idade:</label>
  <input type="number" id="idade" min="0" placeholder="Ex: 17" />
  <button onclick="verificar()">Entrar</button>

  <p id="resultado"></p>

  <script>
    function verificar() {
      const idade = parseInt(document.getElementById("idade").value);
      const resultado = document.getElementById("resultado");

      if (isNaN(idade)) {
        resultado.textContent = "⚠ Por favor, informe uma idade válida.";
      } else if (idade >= 18) {
        resultado.textContent = "Pode entrar!";
      } else {
        resultado.textContent = "Não pode entrar.";
      }
    }
  </script>

</body>
</html>
