<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --calc: #1e293b;
            --text: #f8fafc;
            --num: #334155;
            --op: #f59e0b;
            --sci: #64748b;
            --special: #ef4444;
            --equal: #10b981;
        }

        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        
        .calculadora { 
            background: var(--calc); 
            padding: 25px; 
            border-radius: 24px; 
            width: 380px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        #display {
            width: 100%;
            height: 70px;
            background: #00000033;
            border: none;
            color: #10b981;
            font-size: 1.8rem;
            text-align: right;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        .grade { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); /* 5 colunas para caber mais funções */
            gap: 10px; 
        }

        button {
            height: 55px;
            border: none;
            border-radius: 10px;
            color: var(--text);
            font-weight: bold;
            cursor: pointer;
            background: var(--num);
            transition: 0.2s;
        }

        button:hover { filter: brightness(1.3); }

        /* Cores por Categoria */
        .sci { background: var(--sci); font-size: 0.9rem; }
        .op { background: var(--op); font-size: 1.2rem; }
        .del { background: var(--special); }
        .equal { background: var(--equal); grid-column: span 2; }
        .zero { grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculadora">
    <input type="text" id="display" readonly>
    
    <div class="grade">
        <!-- Linha 1: Funções de Memória/Científicas -->
        <button class="sci" onclick="funcao('sin')">sin</button>
        <button class="sci" onclick="funcao('cos')">cos</button>
        <button class="sci" onclick="funcao('log')">log</button>
        <button class="sci" onclick="add('**')">xʸ</button>
        <button class="del" onclick="limpar()">AC</button>

        <!-- Linha 2: Mais Funções e DEL -->
        <button class="sci" onclick="funcao('sqrt')">√</button>
        <button class="sci" onclick="funcao('pi')">π</button>
        <button class="sci" onclick="add('(')">(</button>
        <button class="sci" onclick="add(')')">)</button>
        <button class="del" onclick="apagar()">DEL</button>

        <!-- Teclado Numérico Principal -->
        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="op" onclick="add('/')">÷</button>
        <button class="op" onclick="add('*')">×</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="op" onclick="add('-')">-</button>
        <button class="op" onclick="add('+')">+</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="equal" onclick="calcular()">=</button>

        <button class="zero" onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function add(v) { display.value += v; }
    function limpar() { display.value = ''; }
    function apagar() { display.value = display.value.slice(0, -1); }
    function calcular() {
        try { display.value = eval(display.value.replace('×', '*').replace('÷', '/')); }
        catch { display.value = "Erro"; }
    }
    function funcao(t) {
        let v = parseFloat(display.value) || 0;
        if(t === 'sin') display.value = Math.sin(v * Math.PI/180).toFixed(4);
        if(t === 'cos') display.value = Math.cos(v * Math.PI/180).toFixed(4);
        if(t === 'log') display.value = Math.log10(v).toFixed(4);
        if(t === 'sqrt') display.value = Math.sqrt(v).toFixed(4);
        if(t === 'pi') display.value += Math.PI.toFixed(4);
    }
</script>

</body>
</html>
