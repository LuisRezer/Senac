<html>
  <head>
    <script>
      function processar() {
        const valor = document.getElementById("meuInput").value;
        document.getElementById("resultado").innerHTML = "ola" + valor + "!";
      }
    </script>
  </head>
  <body>
    <h1>Primeira Pagina Web</h1>
    <p>Parágrafo.</p>

    <!-- ENTRADA -->
    <input id="meuInput" type="text">

    <!-- PROCESSAMENTO -->
    <button onclick="processar()">Clique Aqui</button>

    <!-- SAÍDA -->
    <div id="resultado">O resultado aparecerá aqui</div>
  </body>
</html>
